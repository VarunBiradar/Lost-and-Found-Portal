services:
  - type: web
    name: lost-and-found-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/lost-found-portal-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        fromDatabase:
          name: lost-and-found-db
          property: connectionString
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: DB_USER
        fromDatabase:
          name: lost-and-found-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: lost-and-found-db
          property: password
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: lost-and-found-db
    databaseName: lostfounddb
    user: lostfounduser
    plan: free
