# Application
spring.application.name=Lost and Found Portal
server.port=8080

# Database Configuration (Defaults to H2 for local development)
spring.datasource.url=${DB_URL:jdbc:h2:mem:lostfounddb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokenGenerationLostAndFoundPortal2024SecureKey}
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Logging
logging.level.com.lostfound=INFO
logging.level.org.springframework.security=INFO
