# Application
spring.application.name=Lost and Found Portal
server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:lostfounddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationLostAndFoundPortal2024SecureKey
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.lostfound=INFO
logging.level.org.springframework.security=INFO
